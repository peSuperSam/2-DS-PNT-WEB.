<!DOCTYPE html>
<!-- A tag <html> é a raiz do nosso documento HTML -->
<html lang="pt-BR">

<!-- A tag <head> contém as configurações da página (metadados), como o título da aba e a codificação de caracteres -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Aluno</title>
</head>

<!-- A tag <body> contém todo o conteúdo visível da página -->
<body>

    <!-- A tag <h1> é o título principal, o mais importante da página. Ideal para o nome -->
    <h1>João da Silva</h1>

    <!-- A tag <p> representa um parágrafo, usada para textos contínuos -->
    <p>Estudante de Desenvolvimento de Sistemas, apaixonado por criar soluções para a web.</p>

    <!-- A tag <ul> cria uma lista não ordenada (com bolinhas) -->
    <ul>
        <!-- Cada <li> é um item dentro da nossa lista -->
        <li>HTML5</li>
        <li>CSS3</li>
        <li>JavaScript</li>
    </ul>

    <!-- A tag <a> cria um link (âncora). O atributo 'href' indica o endereço de destino -->
    <!-- O target="_blank" faz o link abrir em uma nova aba -->
    <a href="https://github.com/joaosilva" target="_blank">Meu GitHub</a>

</body>
</html>
